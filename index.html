<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEC Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #003366;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
        }

        .logo {
            width: 70px;
            height: 70px;
            margin-right: 15px;
        }

        nav {
            background-color: #00509e;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        .content {
            padding: 30px;
            text-align: center;
        }

        footer {
            background-color: #003366;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<header>
    <img src="apec-logo.png" alt="APEC Logo" class="logo">
    <h1>APEC Website</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<div class="content">
    <h2>Welcome to APEC</h2>
    <p>This is a basic HTML webpage with an APEC logo and navigation menu.</p>
</div>

<footer>
    <p>&copy; 2026 APEC. All Rights Reserved.</p>
</footer>

</body>
</html>

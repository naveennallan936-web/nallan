<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College - Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#8B0000,#d32f2f);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:380px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.logo{
    width:110px;
    height:110px;
    margin-bottom:10px;
}

h2{
    color:#b30000;
    font-size:22px;
    margin-bottom:8px;
}

p{
    color:#444;
    margin-bottom:5px;
}

span{
    color:#666;
    font-size:14px;
}

h3{
    margin:20px 0;
    color:#222;
}

.input-box{
    display:flex;
    align-items:center;
    border:1px solid #ccc;
    border-radius:5px;
    padding:10px;
    margin:15px 0;
}

.input-box i{
    color:#b30000;
    margin-right:10px;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    font-size:15px;
}

.options{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:20px;
}

.options a{
    color:#b30000;
    text-decoration:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#b30000;
    color:#fff;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#800000;
}
</style>

</head>
<body>

<div class="container">

<div class="login-box">

<img src="Screenshot 2026-07-03 122505.png" alt="APEC Logo" class="logo">

<h2>ADHIPARASAKTHI ENGINEERING COLLEGE</h2>

<p>Melmaruvathur - 603319</p>

<span>Study | Spirituality | Service</span>

<h3>LOGIN</h3>

<form>

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Username" required>
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Password" required>
</div>

<div class="options">
<label>
<input type="checkbox">
Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button type="submit">LOGIN</button>

</form>

</div>

</div>

</body>
</html>

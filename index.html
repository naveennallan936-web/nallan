<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhiparasakthi Engineering College - Login</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="login-box">

        <img src="logo.png" class="logo">

        <h2>ADHIPARASAKTHI ENGINEERING COLLEGE</h2>

        <p>Melmaruvathur</p>

        <span>Study | Spirituality | Service</span>

        <h3>LOGIN</h3>

        <form>

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="Username">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Password">
            </div>

            <div class="options">

                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button>LOGIN</button>

        </form>

    </div>

</div>

</body>
</html>

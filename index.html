<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College - Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#b30000,#ff6666);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:400px;
    background:#fff;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:10px;
}

h2{
    color:#b30000;
    font-size:22px;
    margin-bottom:5px;
}

p{
    color:#444;
    font-weight:bold;
}

span{
    display:block;
    color:#b30000;
    margin:10px 0 20px;
    font-size:14px;
}

h3{
    margin-bottom:20px;
    color:#333;
}

.input-box{
    display:flex;
    align-items:center;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:15px;
    padding:12px;
}

.input-box i{
    color:#b30000;
    margin-right:10px;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    font-size:15px;
}

.options{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:20px;
}

.options a{
    text-decoration:none;
    color:#b30000;
}

button{
    width:100%;
    padding:12px;
    background:#b30000;
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#8b0000;
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:13px;
}
</style>

</head>

<body>

<div class="container">

<div class="login-box">

<img src="logo.png" class="logo" alt="APEC Logo">

<h2>ADHIPARASAKTHI ENGINEERING COLLEGE</h2>

<p>Melmaruvathur - 603319</p>

<span>Study | Spirituality | Service</span>

<h3>LOGIN</h3>

<form>

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Username" required>
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Password" required>
</div>

<div class="options">
<label><input type="checkbox"> Remember Me</label>
<a href="#">Forgot Password?</a>
</div>

<button type="submit">LOGIN</button>

</form>

<div class="footer">
© 2026 Adhiparasakthi Engineering College
</div>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#b30000,#ff6666);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:350px;
    background:#fff;
    border-radius:12px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.logo{
    width:100px;
    height:100px;
    border-radius:50%;
    margin-bottom:10px;
}

h2{
    color:#b30000;
    margin-bottom:5px;
}

p{
    color:#555;
    margin-bottom:20px;
    font-size:14px;
}

.input-box{
    width:100%;
    margin:10px 0;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#800000;
}

.footer{
    margin-top:15px;
    font-size:13px;
    color:#666;
}

a{
    color:#b30000;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

    <img src="logo.png" alt="APEC Logo" class="logo">

    <h2>APEC Login</h2>

    <p>Arulmigu Palaniandavar Polytechnic Engineering College</p>

    <form action="#">
        <div class="input-box">
            <input type="text" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Forgot Password? <a href="#">Click Here</a>
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>APEC Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#8B0000,#D32F2F);
}

.container{
width:380px;
background:#fff;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.logo{
width:110px;
height:110px;
margin-bottom:10px;
}

h2{
color:#B00020;
font-size:22px;
margin-bottom:5px;
}

p{
font-size:15px;
color:#444;
}

span{
display:block;
margin:10px 0;
color:#B00020;
font-weight:bold;
}

h3{
margin:20px 0;
color:#333;
}

.input-box{
display:flex;
align-items:center;
border:1px solid #ccc;
padding:10px;
margin-bottom:15px;
border-radius:5px;
}

.input-box i{
color:#B00020;
margin-right:10px;
}

.input-box input{
width:100%;
border:none;
outline:none;
font-size:15px;
}

.options{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:20px;
}

.options a{
text-decoration:none;
color:#B00020;
}

button{
width:100%;
padding:12px;
background:#B00020;
border:none;
color:#fff;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#7A0015;
}

.footer{
margin-top:20px;
font-size:13px;
color:#555;
}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" alt="APEC Logo" class="logo">

<h2>ADHIPARASAKTHI ENGINEERING COLLEGE</h2>

<p>Melmaruvathur</p>

<span>Study | Spirituality | Service</span>

<h3>LOGIN</h3>

<form>

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Username" required>
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Password" required>
</div>

<div class="options">
<label><input type="checkbox"> Remember Me</label>
<a href="#">Forgot Password?</a>
</div>

<button type="submit">LOGIN</button>

</form>

<div class="footer">
© 2026 Adhiparasakthi Engineering College
</div>

</div>

</body>
</html>
